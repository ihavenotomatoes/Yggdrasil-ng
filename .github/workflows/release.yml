name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: armv7-unknown-linux-musleabihf
            arch: armhf
          - target: aarch64-unknown-linux-musl
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross and cargo-deb
        run: cargo install cross cargo-deb

      - name: Build with cross
        run: cross build --release --target ${{ matrix.target }} -p yggdrasil

      - name: Package .deb
        run: cargo deb -p yggdrasil --target ${{ matrix.target }} --no-build

      - name: Rename bare binary
        run: cp target/${{ matrix.target }}/release/yggdrasil yggdrasil-${{ matrix.arch }}

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: yggdrasil-ng-deb-${{ matrix.arch }}
          path: target/${{ matrix.target }}/debian/*.deb

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: yggdrasil-ng-${{ matrix.arch }}
          path: yggdrasil-${{ matrix.arch }}

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/debian/*.deb
            yggdrasil-${{ matrix.arch }}

  # Bare musl binaries for targets that have no .deb package.
  # (amd64/armhf/arm64 binaries come out of the build-deb job above.)
  build-bare:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: i686-unknown-linux-musl
            arch: i686
          - target: arm-unknown-linux-musleabihf
            arch: armv6

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross

      - name: Build with cross
        run: cross build --release --target ${{ matrix.target }} -p yggdrasil

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/yggdrasil yggdrasil-${{ matrix.arch }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: yggdrasil-ng-${{ matrix.arch }}
          path: yggdrasil-${{ matrix.arch }}

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: yggdrasil-${{ matrix.arch }}

  build-mips:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: mips-unknown-linux-musl
            arch: mips
          - target: mipsel-unknown-linux-musl
            arch: mipsel
          - target: mips64-unknown-linux-muslabi64
            arch: mips64
          - target: mips64el-unknown-linux-muslabi64
            arch: mips64el

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install cross
        run: cargo install cross

      - name: Build with cross
        run: cross +nightly build --release --target ${{ matrix.target }} -p yggdrasil

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/yggdrasil yggdrasil-${{ matrix.arch }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: yggdrasil-ng-${{ matrix.arch }}
          path: yggdrasil-${{ matrix.arch }}

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: yggdrasil-${{ matrix.arch }}

  build-msi:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
            wintun_arch: amd64
          - target: aarch64-pc-windows-msvc
            arch: arm64
            wintun_arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p yggdrasil

      - name: Download wintun
        shell: pwsh
        run: |
          $wintunUrl = "https://www.wintun.net/builds/wintun-0.14.1.zip"
          $wintunSha256 = "07c256185d6ee3652e09fa55c0b673e2624b565e02c4b9091c79ca7d2f24ef51"
          $zipPath = "$env:TEMP\wintun.zip"

          Invoke-WebRequest -Uri $wintunUrl -OutFile $zipPath

          $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLower()
          if ($hash -ne $wintunSha256) {
            Write-Error "Wintun SHA256 mismatch: expected $wintunSha256, got $hash"
            exit 1
          }

          Expand-Archive -Path $zipPath -DestinationPath "$env:TEMP\wintun"

          $dllSrc = "$env:TEMP\wintun\wintun\bin\${{ matrix.wintun_arch }}\wintun.dll"
          $binDir = "target\${{ matrix.target }}\release"
          Copy-Item $dllSrc -Destination $binDir

      - name: Install WiX toolset
        run: dotnet tool install --global wix

      - name: Accept WiX OSMF EULA
        run: wix.exe eula accept wix7

      - name: Get version from Cargo.toml
        id: version
        shell: pwsh
        run: |
          $ver = (Select-String -Path crates\yggdrasil\Cargo.toml -Pattern '^version\s*=\s*"(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build MSI
        shell: pwsh
        run: |
          $binDir = (Resolve-Path "target\${{ matrix.target }}\release").Path
          $srcDir = (Resolve-Path "contrib\msi").Path
          $outMsi = "yggdrasil-ng-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}.msi"

          wix build contrib\msi\yggdrasil-ng.wxs `
            -d Version=${{ steps.version.outputs.VERSION }} `
            -d BinDir=$binDir `
            -d SrcDir=$srcDir `
            -arch ${{ matrix.arch }} `
            -o $outMsi

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: yggdrasil-ng-msi-${{ matrix.arch }}
          path: "*.msi"

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.msi"