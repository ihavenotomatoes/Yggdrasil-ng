name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --workspace

      # Keep the slim build (no ws/quic — e.g. OpenWrt) compiling.
      - name: Check slim build
        run: cargo check -p yggdrasil --no-default-features --features ctl,tun,systemd,ckr